name: Generate Snake Animation

on:
  # Jalankan otomatis setiap hari jam 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  
  # Memungkinkan menjalankan bot secara manual dari tab Actions
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      # Membuat animasi ular dari kontribusi pengguna
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          # Membutuhkan TOKEN untuk mengambil data kontribusi
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      # Push file .svg yang dihasilkan ke branch 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
